project:
  type: website
  output-dir: _site
  # Render allowlist — locked at Item 2 of the v1.0.0 closure sweep
  # (Q6 lock: WRITEUP + EVIDENCE + ADRs + README + CHANGELOG only).
  # Excludes transcripts/, data/raw/git/**, evals/, configs/, src/,
  # scripts/, tests/, and the rest of docs/ from rendered output;
  # those remain reachable via in-text repo links from spokes.
  render:
    - index.qmd
    - README.md
    - CHANGELOG.md
    - WRITEUP.md
    - WRITEUP/*.md
    - EVIDENCE.md
    - decisions/README.md
    - decisions/ADR-*.md

website:
  title: "Prompt-injection classifier — methodology submission"
  description: "Methodology + capability characterisation of a prompt-injection classifier rung ladder, with honest OOD evaluation."
  navbar:
    left:
      - href: index.qmd
        text: Reading guide
      - href: WRITEUP.md
        text: Methodology (TOC)
      - text: Spokes
        menu:
          - WRITEUP/data-decisions.md
          - WRITEUP/model-rungs.md
          - WRITEUP/eval-design.md
          - WRITEUP/threshold-policy.md
          - WRITEUP/reference-scorer-audit.md
          - WRITEUP/methodology-guarantees.md
          - WRITEUP/limitations-and-future-work.md
          - WRITEUP/reproducibility.md
      - href: EVIDENCE.md
        text: Evidence
      - text: Decisions (ADRs)
        href: decisions/README.md
  sidebar:
    style: docked
    search: true
    contents:
      - section: "Reading guide"
        contents:
          - index.qmd
      - section: "Methodology"
        contents:
          - WRITEUP.md
          - WRITEUP/data-decisions.md
          - WRITEUP/model-rungs.md
          - WRITEUP/eval-design.md
          - WRITEUP/threshold-policy.md
          - WRITEUP/reference-scorer-audit.md
          - WRITEUP/methodology-guarantees.md
          - WRITEUP/limitations-and-future-work.md
          - WRITEUP/reproducibility.md
      - section: "Evidence + audit"
        contents:
          - EVIDENCE.md
      - section: "Decisions (ADRs)"
        contents:
          - auto: "decisions/ADR-*.md"

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: false
    code-tools: true
    link-external-newwindow: true
