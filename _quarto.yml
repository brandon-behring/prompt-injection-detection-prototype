project:
  type: website
  output-dir: _site
  # Render allowlist — Item 2 of v1.0.0 closure (WRITEUP + EVIDENCE +
  # ADRs + README + CHANGELOG) + Item 9.B4 of v1.0.1 polish
  # (SPEC_SHEET + SUBMISSION_AUDIT + NEXT_STEPS + assumptions +
  # upstream_issues — previously auto-copied as raw .md, now rendered).
  # v1.2.8 hardening adds top-level docs/*.md plus root agent/reference docs
  # that previously leaked as raw Markdown on the live site. Excludes
  # transcripts/, data/raw/git/**, evals/, configs/, src/, scripts/, tests/,
  # and private scratch notes from rendered output; source artifacts remain
  # reachable through intentional repo links.
  render:
    - index.qmd
    - README.md
    - RESULTS.md
    - CHANGELOG.md
    - WRITEUP.md
    - WRITEUP_PAPER.md
    - WRITEUP_NARRATIVE.md
    - WRITEUP/*.md
    - READING_GUIDE.md
    - EVIDENCE.md
    - SPEC_SHEET.md
    - SUBMISSION_AUDIT.md
    - NEXT_STEPS.md
    - assumptions.md
    - CLAUDE.md
    - code_quality.md
    - docs/*.md
    - decisions/README.md
    - decisions/library_imports.md
    - decisions/ADR-*.md
    - decisions/upstream_issues.md
    # v1.0.7 — pre-rendered + frozen-output-cell notebooks per
    # /exploring-options batch 9 Q2 lock. Quarto renders the
    # .ipynb files as static HTML; output cells remain frozen and
    # non-executing during site render. Operator regen via `make notebooks`.
    - notebooks/01_canonical_results.ipynb
    - notebooks/02_frozen_vs_lora.ipynb
    - notebooks/03_calibration.ipynb
    - notebooks/04_ood_slate.ipynb

execute:
  enabled: false
  freeze: true

website:
  title: "Prompt-injection classifier evaluation"
  description: "Methodology and capability characterization of prompt-injection detectors under honest OOD evaluation."
  favicon: favicon.svg
  # Navbar restructured v1.1.1 per ADR-061: 9 items → 5. Single Methodology
  # dropdown carries hub + reading guide + 8 spokes; Reference dropdown
  # collapses Executive summary + Evidence + auxiliary artifacts + Notebooks;
  # Repo direct-links to GitHub.
  navbar:
    left:
      - href: RESULTS.md
        text: Results
      - text: Methodology
        menu:
          - text: "Academic paper (IMRAD)"
            href: WRITEUP_PAPER.md
          - text: "Narrative arc (story)"
            href: WRITEUP_NARRATIVE.md
          - text: "Router (pick a guide)"
            href: WRITEUP.md
          - text: "Reading guide"
            href: READING_GUIDE.md
          - href: WRITEUP/data-decisions.md
          # Note: only `model-rungs.md` carries an explicit `text:` override
          # — its filename embeds the older `rungs` jargon, while the other
          # 7 spokes have reader-friendly filenames whose H1-inferred label
          # reads cleanly. Do not add `text:` overrides to the other spokes
          # unless their filename term becomes opaque.
          - text: "Model details"
            href: WRITEUP/model-rungs.md
          - href: WRITEUP/eval-design.md
          - href: WRITEUP/threshold-policy.md
          - href: WRITEUP/reference-scorer-audit.md
          - href: WRITEUP/methodology-guarantees.md
          - href: WRITEUP/limitations-and-future-work.md
          - href: WRITEUP/reproducibility.md
      - text: Decisions
        href: decisions/README.md
      - text: Reference
        menu:
          - text: "Project at a glance"
            href: docs/for-hiring-managers.md
          - text: "Public site reader map"
            href: docs/site-reader-map.md
          - text: "Evidence ledger"
            href: EVIDENCE.md
          - text: "Spec lock sheet"
            href: SPEC_SHEET.md
          - text: "Submission audit ledger"
            href: SUBMISSION_AUDIT.md
          - text: "Carryforward + future work"
            href: NEXT_STEPS.md
          - text: "Assumptions registry"
            href: assumptions.md
          - text: "Notebook: canonical results"
            href: notebooks/01_canonical_results.ipynb
          - text: "Notebook: frozen vs LoRA"
            href: notebooks/02_frozen_vs_lora.ipynb
          - text: "Notebook: calibration"
            href: notebooks/03_calibration.ipynb
          - text: "Notebook: OOD slate"
            href: notebooks/04_ood_slate.ipynb
      - text: Repo
        href: https://github.com/brandon-behring/prompt-injection-detection-prototype
        target: _blank
  # Sidebar restructured v1.1.1 per ADR-061: 2-level nesting under Methodology
  # makes the hub-spoke relationship visible at-a-glance.
  sidebar:
    style: docked
    search: true
    contents:
      - section: "Entry"
        contents:
          - text: "Landing page (results + meaning)"
            href: index.qmd
          - text: "README + executive summary"
            href: README.md
          - RESULTS.md
      - section: "Methodology guides (pick a style)"
        contents:
          - text: "Academic paper (IMRAD)"
            href: WRITEUP_PAPER.md
          - text: "Narrative arc (story)"
            href: WRITEUP_NARRATIVE.md
          - text: "Router (1-page chooser)"
            href: WRITEUP.md
          - text: "Reading guide"
            href: READING_GUIDE.md
          - section: "Detailed spokes (8 topics)"
            contents:
              - WRITEUP/data-decisions.md
              - text: "Model details"
                href: WRITEUP/model-rungs.md
              - WRITEUP/eval-design.md
              - WRITEUP/threshold-policy.md
              - WRITEUP/reference-scorer-audit.md
              - WRITEUP/methodology-guarantees.md
              - WRITEUP/limitations-and-future-work.md
              - WRITEUP/reproducibility.md
      - section: "Notebooks"
        contents:
          - notebooks/01_canonical_results.ipynb
          - notebooks/02_frozen_vs_lora.ipynb
          - notebooks/03_calibration.ipynb
          - notebooks/04_ood_slate.ipynb
      - section: "Evidence + audit"
        contents:
          - text: "Evidence ledger"
            href: EVIDENCE.md
      - section: "Reference"
        contents:
          - text: "Public site reader map"
            href: docs/site-reader-map.md
          - text: "Spec lock sheet"
            href: SPEC_SHEET.md
          - text: "Submission audit ledger"
            href: SUBMISSION_AUDIT.md
          - text: "Carryforward + future work"
            href: NEXT_STEPS.md
          - text: "Assumptions registry"
            href: assumptions.md
      - section: "Decisions (ADRs)"
        contents:
          - decisions/README.md
          - decisions/upstream_issues.md
          - auto: "decisions/ADR-*.md"

filters:
  # v1.3.2 P2-1: inject a callout-warning at the top of any ADR whose
  # frontmatter `superseded_by:` is non-empty, so a direct-link reader sees
  # the supersession context. Source ADR bodies remain immutable per ADR-073.
  # Per ADR-081 narrow-relaxation chain.
  - superseded-banner

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: false
    code-tools: false
    link-external-newwindow: true
    citeproc: false
