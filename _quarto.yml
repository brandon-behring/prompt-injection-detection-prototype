project:
  type: website
  output-dir: _site
  # Render allowlist — Item 2 of v1.0.0 closure (WRITEUP + EVIDENCE +
  # ADRs + README + CHANGELOG) + Item 9.B4 of v1.0.1 polish
  # (SPEC_SHEET + SUBMISSION_AUDIT + NEXT_STEPS + assumptions +
  # upstream_issues — previously auto-copied as raw .md, now rendered).
  # Excludes transcripts/, data/raw/git/**, evals/, configs/, src/,
  # scripts/, tests/, and the rest of docs/ from rendered output;
  # those remain reachable via in-text repo links from spokes.
  render:
    - index.qmd
    - README.md
    - EXECUTIVE_SUMMARY.md
    - RESULTS.md
    - CHANGELOG.md
    - WRITEUP.md
    - WRITEUP/*.md
    - EVIDENCE.md
    - SPEC_SHEET.md
    - SUBMISSION_AUDIT.md
    - NEXT_STEPS.md
    - assumptions.md
    - decisions/README.md
    - decisions/ADR-*.md
    - decisions/upstream_issues.md

website:
  title: "Prompt-injection classifier — methodology submission"
  description: "Methodology + capability characterisation of a prompt-injection classifier rung ladder, with honest OOD evaluation."
  navbar:
    left:
      - href: EXECUTIVE_SUMMARY.md
        text: Executive summary
      - href: index.qmd
        text: Reading guide
      - href: RESULTS.md
        text: Results
      - href: WRITEUP.md
        text: Methodology (TOC)
      - text: Spokes
        menu:
          - WRITEUP/data-decisions.md
          - WRITEUP/model-rungs.md
          - WRITEUP/eval-design.md
          - WRITEUP/threshold-policy.md
          - WRITEUP/reference-scorer-audit.md
          - WRITEUP/methodology-guarantees.md
          - WRITEUP/limitations-and-future-work.md
          - WRITEUP/reproducibility.md
      - href: EVIDENCE.md
        text: Evidence
      - text: Reference
        menu:
          - SPEC_SHEET.md
          - SUBMISSION_AUDIT.md
          - NEXT_STEPS.md
          - assumptions.md
      - text: Decisions (ADRs)
        href: decisions/README.md
  sidebar:
    style: docked
    search: true
    contents:
      - section: "Reading guide"
        contents:
          - EXECUTIVE_SUMMARY.md
          - index.qmd
          - RESULTS.md
      - section: "Methodology"
        contents:
          - WRITEUP.md
          - WRITEUP/data-decisions.md
          - WRITEUP/model-rungs.md
          - WRITEUP/eval-design.md
          - WRITEUP/threshold-policy.md
          - WRITEUP/reference-scorer-audit.md
          - WRITEUP/methodology-guarantees.md
          - WRITEUP/limitations-and-future-work.md
          - WRITEUP/reproducibility.md
      - section: "Evidence + audit"
        contents:
          - EVIDENCE.md
      - section: "Reference"
        contents:
          - SPEC_SHEET.md
          - SUBMISSION_AUDIT.md
          - NEXT_STEPS.md
          - assumptions.md
      - section: "Decisions (ADRs)"
        contents:
          - decisions/README.md
          - decisions/upstream_issues.md
          - auto: "decisions/ADR-*.md"

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: false
    code-tools: true
    link-external-newwindow: true
