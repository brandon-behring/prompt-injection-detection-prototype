# configs/rungs/classical_floor.yaml
#
# Locked per ADR-017 (trained-rung slate expansion — classical floor recipe)
# + ADR-019 (cross-rung class_weight=balanced uniform convention)
# + ADR-044 Q1 (seed slate) + Q3 (location) + Q4 (YAML canonical).
#
# Do not edit without superseding ADR. The YAML is the config-hash source of
# truth per SPEC-§5 + ADR-026 line 33 — code reads YAML and instantiates the
# locked recipe; mismatches between code defaults and YAML fail loud.

rung_id: classical_floor
rung_label: TF-IDF + LR classical floor
classifier_type: classical
adr_lock: ADR-017
contamination_state: verified_disjoint

# TF-IDF FeatureUnion specification (per ADR-017 §Decision).
# Combined sparse matrix dimension up to 30000 features (word 15K + char 15K).
tfidf:
  word_ngram_min: 1
  word_ngram_max: 2
  word_max_features: 15000
  char_ngram_min: 3
  char_ngram_max: 5
  char_max_features: 15000
  sublinear_tf: true
  lowercase: true
  strip_accents: unicode

# LogisticRegression specification (per ADR-017 §Decision).
# Fit-to-convergence with sklearn default tolerance; no epoch concept.
logistic_regression:
  solver: liblinear
  C: 1.0
  class_weight: balanced
  max_iter: 1000

# Seeds slate (per ADR-044 Q1 partial supersession of ADR-019 line 99).
# Phase 1 materialized 12 splits at these seeds — trainer must match.
seeds: [42, 43, 44]

# Output paths (per ADR-017 line 60 — no epoch suffix since classical floor
# has no epoch concept).
predictions_dir: evals/predictions
predictions_file_template: tfidf-lr__fold{fold}__seed{seed}.parquet
