# configs/rungs/full_ft.yaml
#
# Locked per ADR-015 (single-backbone ModernBERT-base) + ADR-017 (rung-slate
# expansion) + ADR-019 (transformer training recipe — uniform with frozen-probe
# and LoRA) + ADR-044 Q1 (seeds) + Q4 (YAML canonical) + Q5 (transformer trainer
# split). Storage discipline (per ADR-019 line 154) — intermediate checkpoint
# subdirs are deleted post-training (~150 MB per checkpoint × 12 runs = ~1.8 GB
# of throwaway weights avoided); per-row predictions remain as the audit
# artifact.
#
# Do not edit without superseding ADR.

rung_id: full_ft
rung_label: ModernBERT-base full-FT
classifier_type: full_ft
adr_lock: ADR-015 + ADR-017 + ADR-019
contamination_state: backbone-partial-disjoint

backbone:
  hf_id: answerdotai/ModernBERT-base
  revision: 8949b909ec900327062f0ebf497f51aef5e6f0c8

# Training recipe (per ADR-019 — shared with frozen-probe + LoRA).
training:
  learning_rate: 1.0e-4
  warmup_ratio: 0.10
  lr_scheduler_type: cosine
  num_train_epochs: 2
  bf16: true
  fp16: false
  max_grad_norm: 1.0
  weight_decay: 0.01
  effective_batch: 32
  save_strategy: epoch
  eval_strategy: 'no'

tokenizer:
  max_length: 8192
  pad_to_multiple_of: 8
  truncation: true

class_weight: balanced

seeds: [42, 43, 44]

predictions_dir: evals/predictions
predictions_file_template: full-ft__fold{fold}__seed{seed}__epoch{epoch}.parquet
checkpoint_dir_template: evals/checkpoints/full_ft/fold{fold}/seed{seed}

# Storage discipline (per ADR-019 line 154) — intermediate epoch checkpoint
# subdirs are deleted post-training by the trainer. Per-row predictions are
# the audit-relevant artifact; intermediate weights are not.
#
# X11 (2026-05-17): RELAXED from `true` to `false` for the canonical-recovery
# re-fire. Reason: ADR-019's cleanup was set under the assumption that we
# only needed LODO predictions. The Phase 3 OOD inference (per ADR-021 5-slice
# OOD slate) requires the trained-rung checkpoints to score OOD slices. With
# cleanup=true the weights were deleted on the pod BEFORE the orchestrator
# could rsync them back — full-FT weights permanently lost; X11 re-fire is
# needed to recover. After this re-fire we MUST persist the final-epoch
# checkpoint per cell so OOD inference can run. ADR-019 supersession deferred
# to a follow-up (the cleanup was always a storage convenience, not a
# methodology lock; relaxing it doesn't change any audit-relevant artifact).
cleanup_intermediate_checkpoints: false
