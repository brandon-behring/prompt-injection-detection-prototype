# configs/runpod/headline-lora.yaml
#
# Locked per ADR-020 + ADR-044 Q6. Schema follows runpod-deploy 0.7.7
# schema_version 2. Sweeps 12 cells (3 seeds × 4 LODO folds) for the LoRA
# rung; LoRA adds adapter forward+backward overhead vs frozen-probe but is
# still much cheaper than full-FT.

schema_version: 2
name: pid-phase2-lora
run_id_prefix: pid-lora
state_file: ~/.runpod-pid-phase2-lora-current

local:
  project_root: ../../
  required_paths:
    - configs/rungs/lora.yaml
    - scripts/train_rung.py
    - src/training/
    - pyproject.toml
    - uv.lock

variables:
  remote_repo: /workspace/prompt-injection-detection-submission
  remote_venv: /workspace/.venv

pod:
  # Image refreshed 2026-05-17 per Phase 4 X5 — see comments in
  # configs/runpod/headline-frozen_probe.yaml for the full rationale
  # (previous phantom-image diagnosis + cost burned).
  image: runpod/pytorch:1.0.3-cu1281-torch290-ubuntu2204
  # Datacenters + gpu_order priority refreshed per ADR-049 — see
  # configs/runpod/headline-frozen_probe.yaml comments + ADR-049 §Decision for
  # the full rationale (2026-05-17 stock snapshot; A100-80G is the only
  # provisionable T2 SKU; H100/H200 retained as mid-Phase-2 stock-recovery
  # fallback). SET + TIER STRUCTURE + cap discipline per ADR-020 unchanged.
  datacenters: [US-MD-1, US-WA-1, US-CA-2]
  gpu_order:
    - NVIDIA A100-SXM4-80GB
    - NVIDIA A100 80GB PCIe
    - NVIDIA H100 80GB HBM3
    - NVIDIA H100 NVL
    - NVIDIA H100 SXM
    - NVIDIA H100 PCIe
    - NVIDIA H200
    - NVIDIA H200 NVL
    - NVIDIA L40S
    - NVIDIA A100-SXM4-40GB

storage:
  mode: ephemeral
  volume_mount: /workspace
  volume_gb: 100

ssh:
  key_path: ~/.ssh/id_ed25519

budget:
  cost_cap_usd: 60.0
  assumed_hourly_rate_usd: 3.50
  poll_interval_sec: 60

secrets:
  - name: hf
    destination: /workspace/secrets/env
    mode: "0600"
    env: [HF_TOKEN]

remote_env:
  source_files:
    - /workspace/secrets/env
  exports:
    HF_HOME: /workspace/.hf_cache
    HUGGINGFACE_HUB_CACHE: /workspace/.hf_cache
    HF_HUB_DOWNLOAD_TIMEOUT: "120"
    UV_CACHE_DIR: /workspace/uv_cache
    UV_PROJECT_ENVIRONMENT: "{remote_venv}"
    # Phase 4 X7 — FUSE /workspace requires UV_LINK_MODE=copy; see comments
    # in configs/runpod/headline-frozen_probe.yaml for full rationale.
    UV_LINK_MODE: copy

setup:
  - command: "test -d /workspace && touch /workspace/.runpod-deploy-write-test && rm /workspace/.runpod-deploy-write-test"
    timeout_sec: 60
  - command: "which rsync >/dev/null 2>&1 || { apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq rsync ; }"
    timeout_sec: 300
  - command: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    timeout_sec: 300
  - command: "mkdir -p /workspace/.hf_cache /workspace/uv_cache {remote_repo}/evals/predictions {remote_repo}/evals/checkpoints"
    timeout_sec: 120

staging:
  - label: pid-code
    source: "{project_root}/"
    destination: "{remote_repo}/"
    excludes:
      - .git/
      - .venv/
      - .pytest_cache/
      - .ruff_cache/
      - .mypy_cache/
      - "**/__pycache__/"
      - "**/*.pyc"
      - .hf_cache/
      - data/raw/
      - evals/predictions/
      - evals/checkpoints/
      - transcripts/
  - label: pid-processed-data
    source: "{project_root}/data/processed/"
    destination: "{remote_repo}/data/processed/"

preflight:
  - command: "export PATH=$HOME/.local/bin:$PATH && cd {remote_repo} && uv sync --extra dev -v"
    timeout_sec: 3600
    with_env: true

run:
  script_path: /workspace/pid_phase2_lora.sh
  log_path: /workspace/pid_phase2_lora.log
  success_marker: "[train_rung] DONE rung=lora"
  body: |
    #!/usr/bin/env bash
    set -euo pipefail
    export PATH="$HOME/.local/bin:$PATH"
    [ -f /workspace/secrets/env ] && source /workspace/secrets/env || true
    export HF_HOME=/workspace/.hf_cache
    export HUGGINGFACE_HUB_CACHE=/workspace/.hf_cache
    export HF_HUB_DOWNLOAD_TIMEOUT=120
    export UV_CACHE_DIR=/workspace/uv_cache
    export UV_PROJECT_ENVIRONMENT={remote_venv}
    export PYTHONUNBUFFERED=1
    cd {remote_repo}

    echo "[pid-phase2-lora] START $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    uv run python scripts/train_rung.py --rung lora
    echo "[pid-phase2-lora] DONE $(date -u +%Y-%m-%dT%H:%M:%SZ)"

artifacts:
  - label: pid-predictions-lora
    remote_path: "{remote_repo}/evals/predictions/"
    local_path: "{project_root}/evals/predictions/"
    delete: false
  - label: pid-checkpoints-lora
    remote_path: "{remote_repo}/evals/checkpoints/lora/"
    local_path: "{project_root}/evals/checkpoints/lora/"
    delete: false
  - label: log
    remote_path: /workspace/pid_phase2_lora.log
    local_path: "{run_dir}"
    required: false
    delete: false

stop:
  on_success: true
  on_failure: false
