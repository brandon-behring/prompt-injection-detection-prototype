# configs/runpod/headline-full_ft.yaml
#
# Locked per ADR-020 + ADR-044 Q6. Schema follows runpod-deploy 0.7.7
# schema_version 2. Sweeps 12 cells (3 seeds × 4 LODO folds) for the full-FT
# rung — most expensive of the 3 transformer rungs (full backbone trained;
# 149M params × bf16 backward = significant memory pressure on smaller GPUs).
# Per ADR-019 line 154, intermediate epoch checkpoints are deleted by the
# trainer post-training (per cleanup_intermediate_checkpoints: true in
# configs/rungs/full_ft.yaml); only per-row predictions persist.

schema_version: 2
name: pid-phase2-full-ft
run_id_prefix: pid-full-ft
state_file: ~/.runpod-pid-phase2-full-ft-current

local:
  project_root: ../../
  required_paths:
    - configs/rungs/full_ft.yaml
    - scripts/train_rung.py
    - src/training/
    - pyproject.toml
    - uv.lock

variables:
  remote_repo: /workspace/prompt-injection-detection-submission
  # X8 (2026-05-17): venv on overlay disk (/root), NOT FUSE. See comments in
  # configs/runpod/headline-frozen_probe.yaml + memory entry
  # fuse-workspace-needs-uv-link-mode-copy.md for rationale.
  remote_venv: /root/.venv

pod:
  # Image refreshed 2026-05-17 per Phase 4 X5 — see comments in
  # configs/runpod/headline-frozen_probe.yaml for the full rationale.
  image: runpod/pytorch:1.0.3-cu1281-torch290-ubuntu2204
  # Datacenters + gpu_order priority refreshed per ADR-049 — same change as
  # headline-frozen_probe + headline-lora; full-FT canonical run DEFERRED to
  # post-rehearsal per ADR-049 §Per-rung scope (fires after v0.9.0-rc1 dress-
  # rehearsal passes cleanly per ADR-046 Q7 + ADR-033; gated by follow-up ADR
  # superseding ADR-049's defer status when fired). Config kept in lockstep
  # so full-FT is ready to fire without further edits when stock improves.
  datacenters: [US-MD-1, US-WA-1, US-CA-2]
  gpu_order:
    - NVIDIA A100-SXM4-80GB
    - NVIDIA A100 80GB PCIe
    - NVIDIA H100 80GB HBM3
    - NVIDIA H100 NVL
    - NVIDIA H100 SXM
    - NVIDIA H100 PCIe
    - NVIDIA H200
    - NVIDIA H200 NVL
    - NVIDIA L40S
    - NVIDIA A100-SXM4-40GB

storage:
  mode: ephemeral
  volume_mount: /workspace
  # Larger volume for full-FT intermediate checkpoints (deleted post-train
  # per ADR-019 storage discipline; but need room during training).
  volume_gb: 150

ssh:
  key_path: ~/.ssh/id_ed25519

budget:
  cost_cap_usd: 100.0
  assumed_hourly_rate_usd: 3.50
  poll_interval_sec: 60

secrets:
  - name: hf
    destination: /workspace/secrets/env
    mode: "0600"
    env: [HF_TOKEN]

remote_env:
  source_files:
    - /workspace/secrets/env
  exports:
    HF_HOME: /workspace/.hf_cache
    HUGGINGFACE_HUB_CACHE: /workspace/.hf_cache
    HF_HUB_DOWNLOAD_TIMEOUT: "120"
    # X8 (2026-05-17): uv_cache on overlay disk, NOT FUSE. See comments in
    # configs/runpod/headline-frozen_probe.yaml for full rationale.
    UV_CACHE_DIR: /root/uv_cache
    UV_PROJECT_ENVIRONMENT: "{remote_venv}"
    # X7 (2026-05-17): UV_LINK_MODE=copy as defense-in-depth. See above + memory entry.
    UV_LINK_MODE: copy

setup:
  - command: "test -d /workspace && touch /workspace/.runpod-deploy-write-test && rm /workspace/.runpod-deploy-write-test"
    timeout_sec: 60
  - command: "which rsync >/dev/null 2>&1 || { apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq rsync ; }"
    timeout_sec: 300
  - command: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    timeout_sec: 300
  - command: "mkdir -p /workspace/.hf_cache /workspace/uv_cache {remote_repo}/evals/predictions {remote_repo}/evals/checkpoints"
    timeout_sec: 120

staging:
  - label: pid-code
    source: "{project_root}/"
    destination: "{remote_repo}/"
    excludes:
      - .git/
      - .venv/
      - .pytest_cache/
      - .ruff_cache/
      - .mypy_cache/
      - "**/__pycache__/"
      - "**/*.pyc"
      - .hf_cache/
      - data/raw/
      - evals/predictions/
      - evals/checkpoints/
      - transcripts/
  - label: pid-processed-data
    source: "{project_root}/data/processed/"
    destination: "{remote_repo}/data/processed/"

preflight:
  - command: "export PATH=$HOME/.local/bin:$PATH && cd {remote_repo} && uv sync --extra dev -v"
    timeout_sec: 3600
    with_env: true

run:
  script_path: /workspace/pid_phase2_full_ft.sh
  log_path: /workspace/pid_phase2_full_ft.log
  success_marker: "[train_rung] DONE rung=full_ft"
  body: |
    #!/usr/bin/env bash
    set -euo pipefail
    export PATH="$HOME/.local/bin:$PATH"
    [ -f /workspace/secrets/env ] && source /workspace/secrets/env || true
    export HF_HOME=/workspace/.hf_cache
    export HUGGINGFACE_HUB_CACHE=/workspace/.hf_cache
    export HF_HUB_DOWNLOAD_TIMEOUT=120
    export UV_CACHE_DIR=/root/uv_cache
    export UV_PROJECT_ENVIRONMENT={remote_venv}
    export PYTHONUNBUFFERED=1
    cd {remote_repo}

    echo "[pid-phase2-full-ft] START $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    # X9 (2026-05-17): see comments in configs/runpod/headline-lora.yaml run.body.
    # /root/training_staging required to bypass FUSE F_SETLKW hang during HF
    # Trainer atomic-save. Full-FT writes more frequent intermediate checkpoints
    # than LoRA, so the bypass is doubly important here.
    uv run python scripts/train_rung.py --rung full_ft --checkpoint-staging-root /root/training_staging
    echo "[pid-phase2-full-ft] DONE $(date -u +%Y-%m-%dT%H:%M:%SZ)"

artifacts:
  - label: pid-predictions-full-ft
    remote_path: "{remote_repo}/evals/predictions/"
    local_path: "{project_root}/evals/predictions/"
    delete: false
  # Note: full-FT intermediate checkpoints are deleted by the trainer per
  # ADR-019 storage discipline. Final-epoch checkpoint subdir remains.
  - label: pid-checkpoints-full-ft
    remote_path: "{remote_repo}/evals/checkpoints/full_ft/"
    local_path: "{project_root}/evals/checkpoints/full_ft/"
    delete: false
  - label: log
    remote_path: /workspace/pid_phase2_full_ft.log
    local_path: "{run_dir}"
    required: false
    delete: false

stop:
  on_success: true
  on_failure: false
