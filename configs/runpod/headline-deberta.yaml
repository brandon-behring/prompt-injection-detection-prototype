# configs/runpod/headline-deberta.yaml
#
# DeBERTa-v3-base medium ablation per ADR-060 (chunk_and_average +
# head_truncation as confound controls; neither claimed canonical).
# v1.1.2 EXECUTION (was v1.1.0 SCAFFOLD; brought to schema parity with
# headline-frozen_probe.yaml in v1.1.2 Phase D pre-flight).
#
# Sequential single-pod 2-fire shape via `lifecycle.on_success: recycle`
# (runpod-deploy #90 consumption per ADR-059). The Makefile
# `deberta-ablation` target fires this config twice — first with
# `--var truncation_strategy=chunk_and_average`, then with
# `--var truncation_strategy=head_truncation` — sharing the warm pod.
# Explicit `runpod-deploy stop` after fire 2 tears the pod down.

schema_version: 2
name: pid-v1-1-2-deberta-ablation
run_id_prefix: pid-deberta
state_file: ~/.runpod-pid-deberta-ablation-current

local:
  project_root: ../../
  required_paths:
    - configs/rungs/deberta_v3_base.yaml
    - scripts/train_rung.py
    - src/training/                     # v1.1.2 Phase A: load_backbone generic loader
    - src/inference/                    # v1.1.2 Phase B: windowed.py
    - pyproject.toml
    - uv.lock

variables:
  # v1.1.2 Phase D retry-3: project code lives on /root (container overlay disk)
  # NOT /workspace (FUSE/MooseFS). Three prior fire attempts hit transient
  # `Input/output error (5)` mid-rsync push on different /workspace files
  # (FUSE intermittency per `fuse-workspace-needs-uv-link-mode-copy` memory;
  # X8 workaround for venv extended here to project files too). /root has
  # 20 GB container disk; project + data + venv + DeBERTa weights fit
  # comfortably (~5 GB total).
  remote_repo: /root/prompt-injection-detection-submission
  # X8 (2026-05-17): venv on overlay disk (/root), NOT on /workspace (FUSE/MooseFS).
  # See headline-frozen_probe.yaml for the discovery context (HF Trainer atomic
  # checkpoint save + uv install-phase atomic writes acquire POSIX exclusive
  # locks; MooseFS#380 documents F_SETLKW hangs on FUSE; uv#17801 + uv 0.x
  # hardlink-mode workaround insufficient alone).
  remote_venv: /root/.venv
  # Truncation strategy per ADR-060 — overridden per-fire by `--var
  # truncation_strategy=<chunk_and_average|head_truncation>`. Default kept
  # benign for an unguarded invocation; the Makefile orchestrator always
  # overrides it explicitly.
  truncation_strategy: chunk_and_average

pod:
  # Image refreshed 2026-05-17 per Phase 4 X5 (see headline-frozen_probe.yaml
  # for the phantom-image post-mortem). 1.0.3-cu1281-torch290-ubuntu2204
  # matches pinned torch 2.11.0+cu128; pod's pre-installed PyTorch 2.9.0
  # gets overridden by `uv sync --extra dev` in preflight.
  image: runpod/pytorch:1.0.3-cu1281-torch290-ubuntu2204
  # DeBERTa-v3-base is much smaller than ModernBERT (~140M params; only 512-
  # token attention window) → L4 / L40S / A100 PCIe all viable. Smaller-GPU-
  # first ladder is appropriate for the medium-ablation scope (single fold/
  # seed; ~30 min wall per fire).
  datacenters: [US-MD-1, US-WA-1, US-CA-2]
  gpu_order:
    - NVIDIA L4
    - NVIDIA L40S
    - NVIDIA A100 80GB PCIe
    - NVIDIA A100-SXM4-80GB
    - NVIDIA A100-SXM4-40GB

storage:
  mode: ephemeral
  volume_mount: /workspace
  # DeBERTa-v3-base checkpoints are small (~600 MB); 50 GB ample for the
  # 2-fire shape.
  volume_gb: 50

ssh:
  key_path: ~/.ssh/id_ed25519

budget:
  # Generous cap relative to ~$5-7 expected actual for 2 fires (per ADR-060);
  # well under ADR-020 $125 per-job soft cap.
  cost_cap_usd: 25.0
  # L4 ~$0.60/h; A100-80G PCIe ~$1.50/h; budgeted conservatively at $2.00/h
  # for cost preview.
  assumed_hourly_rate_usd: 2.00
  poll_interval_sec: 60
  # #88 consumption (replaces deleted scripts/runpod_deploy_long_ssh.py shim).
  ssh_ready_timeout_sec: 600

# HF_TOKEN injection per ADR-035 three-store split (RunPod pod-secrets layer).
secrets:
  - name: hf
    destination: /root/secrets/env
    mode: "0600"
    env: [HF_TOKEN]

remote_env:
  source_files:
    - /root/secrets/env
  exports:
    # v1.1.2 Phase D retry-3: HF cache on /root (overlay disk) not /workspace
    # (FUSE). Mirrors the X8 venv-on-/root workaround per `fuse-workspace-
    # needs-uv-link-mode-copy` memory. HF Hub download writes large files
    # (snapshot of DeBERTa-v3-base ~440 MB) with atomic-rename semantics;
    # FUSE F_SETLKW hangs on the rename.
    HF_HOME: /root/.hf_cache
    HUGGINGFACE_HUB_CACHE: /root/.hf_cache
    HF_HUB_DOWNLOAD_TIMEOUT: "120"
    # X8 (2026-05-17): uv_cache on overlay disk (NOT FUSE). uv's resolution
    # phase does git operations on cached git+https deps; FUSE F_SETLKW hangs.
    UV_CACHE_DIR: /root/uv_cache
    UV_PROJECT_ENVIRONMENT: "{remote_venv}"
    # X7 (2026-05-17): UV_LINK_MODE=copy avoids stale-file-handle (os error 116)
    # on FUSE-mounted /workspace during wheel install. Kept after X8 as
    # defense-in-depth. See memory/fuse-workspace-needs-uv-link-mode-copy.md.
    UV_LINK_MODE: copy

setup:
  # /root sanity write-test (overlay disk; should always pass).
  - command: "touch /root/.runpod-deploy-write-test && rm /root/.runpod-deploy-write-test"
    timeout_sec: 60
  - command: "which rsync >/dev/null 2>&1 || { apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq rsync ; }"
    timeout_sec: 300
  - command: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    timeout_sec: 300
  - command: "mkdir -p /root/.hf_cache /root/uv_cache {remote_repo}/evals/predictions {remote_repo}/evals/checkpoints"
    timeout_sec: 120

staging:
  - label: pid-code
    source: "{project_root}/"
    destination: "{remote_repo}/"
    excludes:
      - .git/
      - .venv/
      - .pytest_cache/
      - .ruff_cache/
      - .mypy_cache/
      - "**/__pycache__/"
      - "**/*.pyc"
      - .hf_cache/
      - data/raw/
      # Excludes broadened for the DeBERTa ablation (v1.1.2 Phase D): the pod
      # only needs src/ + scripts/ + configs/ + pyproject.toml + uv.lock for
      # training. Excluding the eval/audit/doc trees defends against (a)
      # transient rsync I/O errors on FUSE-backed /workspace touching the 282
      # ADR-057 provenance manifests, (b) concurrent-writer collisions when
      # the doc agent edits docs/* mid-push, (c) wasted upload time on
      # ~hundreds of MB of historical artifacts not needed for DeBERTa.
      - evals/predictions/
      - evals/checkpoints/
      - evals/manifests/      # ADR-057 backfilled provenance; pod doesn't use these
      - evals/audit/          # LLM-judge cache + cross-fold-CI audit; pod-irrelevant
      - evals/metrics/        # historical per_cell.parquet; pod-irrelevant
      - evals/bootstrap/      # Phase 4 CI cells; pod-irrelevant
      - evals/calibration/    # Phase 3 calibration spoke; pod-irrelevant
      - evals/dedup_calibration.json
      - evals/results.json    # T0 score-match reference; pod-irrelevant
      - evals/cost_*.csv
      - WRITEUP/              # reviewer-facing narrative; pod-irrelevant
      - docs/                 # Quarto site + dossier + plots; pod-irrelevant
      - decisions/            # ADR markdowns; pod-irrelevant
      - analysis/             # v1.0.7 CSV exports; pod-irrelevant
      - _site/                # rendered Quarto output; pod-irrelevant
      - artifacts/            # historical runpod-deploy artifacts; pod-irrelevant
      - notebooks/            # jupytext-paired notebooks; pod-irrelevant
      - tests/                # pytest test files; pod doesn't run pytest
      - transcripts/
  - label: pid-processed-data
    source: "{project_root}/data/processed/"
    destination: "{remote_repo}/data/processed/"

preflight:
  - command: "export PATH=$HOME/.local/bin:$PATH && cd {remote_repo} && uv sync --extra dev -v"
    timeout_sec: 3600
    with_env: true

run:
  script_path: /root/pid_v1_1_2_deberta_{truncation_strategy}.sh
  log_path: /root/pid_v1_1_2_deberta_{truncation_strategy}.log
  success_marker: "[train_rung] DONE rung=deberta_v3_base"
  body: |
    #!/usr/bin/env bash
    set -euo pipefail
    export PATH="$HOME/.local/bin:$PATH"
    [ -f /root/secrets/env ] && source /root/secrets/env || true
    export HF_HOME=/root/.hf_cache
    export HUGGINGFACE_HUB_CACHE=/root/.hf_cache
    export HF_HUB_DOWNLOAD_TIMEOUT=120
    export UV_CACHE_DIR=/root/uv_cache
    export UV_PROJECT_ENVIRONMENT={remote_venv}
    export PYTHONUNBUFFERED=1
    cd {remote_repo}

    echo "[pid-v1-1-2-deberta] START strategy={truncation_strategy} $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    # v1.1.2 Phase D: NO --checkpoint-staging-root needed. Since remote_repo is
    # now on /root (container overlay disk; not FUSE), HF Trainer's atomic-save
    # via POSIX F_SETLKW works normally. Skipping the staging-dir bounce saves
    # ~2x disk usage during the post-training copy phase (which previously
    # exhausted the 20 GB /root container disk on a full-fp32 184M-param fire).
    uv run python scripts/train_rung.py \
      --rung deberta_v3_base \
      --fold-only 0 --seed-only 42 \
      --truncation-strategy {truncation_strategy}
    echo "[pid-v1-1-2-deberta] DONE strategy={truncation_strategy} $(date -u +%Y-%m-%dT%H:%M:%SZ)"

artifacts:
  - label: pid-predictions-deberta
    remote_path: "{remote_repo}/evals/predictions/"
    local_path: "{project_root}/evals/predictions/"
    delete: false
  - label: pid-checkpoints-deberta
    remote_path: "{remote_repo}/evals/checkpoints/deberta_v3_base/"
    local_path: "{project_root}/evals/checkpoints/deberta_v3_base/"
    required: false  # checkpoints are optional per ADR-019 storage discipline; predictions are the audit-relevant artifact
    delete: false
  - label: log
    remote_path: /root/pid_v1_1_2_deberta_{truncation_strategy}.log
    local_path: "{run_dir}"
    required: false
    delete: false

# Sequential 2-fire orchestration: on_success: recycle keeps the pod warm
# for fire 2 (head_truncation reuses the chunk_and_average pod). After fire
# 2 completes, the Makefile `deberta-ablation` target runs an explicit
# `runpod-deploy stop` to tear down (runpod-deploy v0.8.4 has no per-fire
# on_success override CLI flag). on_failure: stop preserves forensic SSH
# access per ADR-013 pre-teardown checklist.
lifecycle:
  on_success: recycle
  on_failure: stop
