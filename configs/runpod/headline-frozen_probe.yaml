# configs/runpod/headline-frozen_probe.yaml
#
# Locked per ADR-020 (compute infrastructure + cost discipline) + ADR-044 Q6
# (per-rung orchestration). Schema follows runpod-deploy 0.7.7 schema_version
# 2 (see runpod-deploy/docs/source/lifecycle.md §"Where each YAML section
# maps"). Sweeps 12 cells (3 seeds × 4 LODO folds) for the frozen-probe rung;
# failure-isolation lets us re-run a single rung mid-Phase-2 without losing
# progress on other rungs.
#
# Cost cap of $40 reflects this being the cheapest of the 3 transformer rungs —
# backbone frozen; only the classifier head trains; small compute footprint.

schema_version: 2
name: pid-phase2-frozen-probe
run_id_prefix: pid-frozen-probe
state_file: ~/.runpod-pid-phase2-frozen-probe-current

local:
  project_root: ../../
  required_paths:
    - configs/rungs/frozen_probe.yaml
    - scripts/train_rung.py
    - src/training/
    - pyproject.toml
    - uv.lock

variables:
  remote_repo: /workspace/prompt-injection-detection-submission
  remote_venv: /workspace/.venv

pod:
  image: runpod/pytorch:2.5.0-py3.13-cuda12.4.1-cudnn9-devel
  datacenters: [US-MD-1, EU-RO-1]
  # Per ADR-020 §GPU failover ladder — 8-class priority. Tier 1 (H100/H200/
  # A100-80G) — bf16 native + flash-attn-2 native; tier 2 (L40S) — degrade
  # gracefully via load_modernbert flash-attn-fallback recipe; tier 3 emergency
  # (A100-40G) — may need batch-size adjustment via batch_table BATCH_TABLE.
  gpu_order:
    - NVIDIA H100 80GB HBM3
    - NVIDIA H100 NVL
    - NVIDIA H100 SXM
    - NVIDIA H100 PCIe
    - NVIDIA H200
    - NVIDIA H200 NVL
    - NVIDIA A100-SXM4-80GB
    - NVIDIA A100 80GB PCIe
    - NVIDIA L40S
    - NVIDIA A100-SXM4-40GB

storage:
  mode: ephemeral
  volume_mount: /workspace
  volume_gb: 100

ssh:
  key_path: ~/.ssh/id_ed25519

# Per-job cost cap (per ADR-020 + A-002 envelope).
budget:
  cost_cap_usd: 40.0
  assumed_hourly_rate_usd: 3.50
  poll_interval_sec: 60

# HF_TOKEN injection per ADR-035 three-store split (RunPod pod-secrets layer).
secrets:
  - name: hf
    destination: /workspace/secrets/env
    mode: "0600"
    env: [HF_TOKEN]

remote_env:
  source_files:
    - /workspace/secrets/env
  exports:
    HF_HOME: /workspace/.hf_cache
    HUGGINGFACE_HUB_CACHE: /workspace/.hf_cache
    HF_HUB_DOWNLOAD_TIMEOUT: "120"
    UV_CACHE_DIR: /workspace/uv_cache
    UV_PROJECT_ENVIRONMENT: "{remote_venv}"

setup:
  - command: "test -d /workspace && touch /workspace/.runpod-deploy-write-test && rm /workspace/.runpod-deploy-write-test"
    timeout_sec: 60
  - command: "which rsync >/dev/null 2>&1 || { apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq rsync ; }"
    timeout_sec: 300
  - command: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    timeout_sec: 300
  - command: "mkdir -p /workspace/.hf_cache /workspace/uv_cache {remote_repo}/evals/predictions {remote_repo}/evals/checkpoints"
    timeout_sec: 120

staging:
  - label: pid-code
    source: "{project_root}/"
    destination: "{remote_repo}/"
    excludes:
      - .git/
      - .venv/
      - .pytest_cache/
      - .ruff_cache/
      - .mypy_cache/
      - "**/__pycache__/"
      - "**/*.pyc"
      - .hf_cache/
      - data/raw/
      - evals/predictions/
      - evals/checkpoints/
      - transcripts/
  - label: pid-processed-data
    source: "{project_root}/data/processed/"
    destination: "{remote_repo}/data/processed/"

preflight:
  - command: "export PATH=$HOME/.local/bin:$PATH && cd {remote_repo} && uv sync --extra dev"
    timeout_sec: 1800
    with_env: true

run:
  script_path: /workspace/pid_phase2_frozen_probe.sh
  log_path: /workspace/pid_phase2_frozen_probe.log
  success_marker: "[train_rung] DONE rung=frozen_probe"
  body: |
    #!/usr/bin/env bash
    set -euo pipefail
    export PATH="$HOME/.local/bin:$PATH"
    [ -f /workspace/secrets/env ] && source /workspace/secrets/env || true
    export HF_HOME=/workspace/.hf_cache
    export HUGGINGFACE_HUB_CACHE=/workspace/.hf_cache
    export HF_HUB_DOWNLOAD_TIMEOUT=120
    export UV_CACHE_DIR=/workspace/uv_cache
    export UV_PROJECT_ENVIRONMENT={remote_venv}
    export PYTHONUNBUFFERED=1
    cd {remote_repo}

    echo "[pid-phase2-frozen-probe] START $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    uv run python scripts/train_rung.py --rung frozen_probe
    echo "[pid-phase2-frozen-probe] DONE $(date -u +%Y-%m-%dT%H:%M:%SZ)"

artifacts:
  - label: pid-predictions-frozen-probe
    remote_path: "{remote_repo}/evals/predictions/"
    local_path: "{project_root}/evals/predictions/"
    delete: false
  - label: pid-checkpoints-frozen-probe
    remote_path: "{remote_repo}/evals/checkpoints/frozen_probe/"
    local_path: "{project_root}/evals/checkpoints/frozen_probe/"
    delete: false
  - label: log
    remote_path: /workspace/pid_phase2_frozen_probe.log
    local_path: "{run_dir}"
    required: false
    delete: false

# Preserve pod on failure for forensic SSH; stop on success per ADR-013 pre-
# teardown checklist (predictions parquets are pulled to artifacts/ first).
stop:
  on_success: true
  on_failure: false
