[project]
name = "prompt-injection-detection-prototype"
version = "0.0.0"
description = "Prompt-injection detection prototype: methodology case study"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.13"
dependencies = [
    # Load-bearing libraries (no hand-rolling allowed — see SPEC_GREENFIELD §Tech-Stack).
    # Versions locked at Phase 0-08 per ADR-036 (tag pin + freeze for submission window).
    # Bump triggers limited to blocking upstream bug + critical security fix + post-submission patch per ADR-033.
    "eval-toolkit @ git+https://github.com/brandon-behring/eval-toolkit@v0.34.0",
    # runpod-deploy is a LOCAL orchestrator — invoked from the operator's machine via
    # `make headline-*` Makefile targets; the pod itself never imports it. Moved to
    # [project.optional-dependencies] dev per runpod-deploy validator scan finding
    # (2026-05-17 Phase 4 close); main-deps inclusion was a noop that added install
    # surface to every pod sync.
    "research_toolkit @ git+https://github.com/brandon-behring/research_toolkit@v1.9.1",
    # Phase 1 (Data) deps per ADR-041 — manifest infra (Commit 1) + loaders (Commit 2)
    # + dedup encoder (Commit 3) + splits + audit (Commits 4-5).
    "huggingface_hub>=0.25",
    "pyyaml>=6",
    "datasets>=3.0",
    "pandas>=2.2",
    "pyarrow>=17",
    "sentence-transformers>=3.0",
    "numpy>=2.0",
    "scikit-learn>=1.5",
    # OpenAI judge for LLM-pre-label dedup bootstrap (per ADR-042); same snapshot as ADR-018 headline rater.
    "openai>=1.50",
    # Phase 2 (Training) deps per ADR-019 + ADR-020 + ADR-044 — transformer rung primitives.
    # ModernBERT-base requires transformers>=4.48.
    "transformers>=4.48",
    "peft>=0.13",
    "torch>=2.5",
    "accelerate>=1.0",
    # Phase 3 (Evaluation) deps per ADR-018 + ADR-045 — reference scorers + pydantic contracts.
    # pydantic v2 used for src/eval/schemas.py per ADR-045 Q7.
    "pydantic>=2.5",
    # anthropic client for claude-sonnet-4-6 LLM judge per ADR-018.
    "anthropic>=0.40",
    # Phase 4 (Analysis) deps per ADR-046 Q6 — figures library-first hybrid.
    # eval_toolkit.plotting requires matplotlib; SVG output to docs/plots/ per ADR-030.
    "matplotlib>=3.8",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4",
    "mypy>=1.8",
    "pytest>=8",
    "pytest-cov>=4",
    "pyyaml>=6",
    "types-PyYAML>=6",
    "pandas-stubs>=2.2",
    # Local-only orchestrator — invoked from the operator's machine via
    # `make headline-*` / `make headline-dry-run`. Pinned per ADR-036 (tag-pin
    # + freeze for submission window). Pod never imports it.
    "runpod-deploy @ git+https://github.com/brandon-behring/runpod-deploy@v0.7.7",
]
notebook = [
    "jupyter>=1",
    "nbstripout>=0.7",
    "nbval>=0.11",
]

[tool.jupytext]
formats = "ipynb,py:percent"

# Pin torch to a CUDA-12.8 wheel via the pytorch-cu128 index.
# RunPod pods (as of 2026-05) support CUDA up to 12.8; newer torch wheels
# from default PyPI can resolve to a CUDA build that fails torch.cuda.is_available()
# silently despite the GPU being functional. Surfaced by `runpod-deploy validate`
# at Phase 4 close on the headline-* configs (see ADR-049 + docs/runpod-gotchas.md
# pattern referenced from the runpod-deploy preflight scan).
# `explicit = true` prevents uv from transparently pulling torch from this index
# for any other package; only direct dispatch via [tool.uv.sources] uses it.
[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu128" }

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true

# Some upstreams do not ship pep-561 stubs; suppress missing-imports here so
# the rule works identically in local mypy + pre-commit hook env.
# Cloned upstream sources under data/raw/git/ produce duplicate-module errors
# (e.g., bipia/benchmark/{qa,abstract}/process.py). data/raw/ is gitignored
# and reserved per ADR-026 / ADR-044 Q2; exclude from strict scan.
exclude = [
    "data/raw/.*",
    "data/processed/.*",
    ".hf_cache/.*",
]

[[tool.mypy.overrides]]
module = [
    "datasets",
    "sentence_transformers",
    "sklearn.*",
    "transformers",
    "transformers.*",
    "peft",
    "peft.*",
    "accelerate",
    "accelerate.*",
    "anthropic",
    "anthropic.*",
    "eval_toolkit",
    "eval_toolkit.*",
    "scipy",
    "scipy.*",
    "matplotlib",
    "matplotlib.*",
    "runpod_deploy",
    "runpod_deploy.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "unit: fast, deterministic unit tests",
    "smoke: end-to-end smoke tests (~5 min)",
    "integration: integration tests (may need network or GPU)",
    "network: tests that require network access",
]
