name: Writeup numerical-claim audit

# Per ADR-065 §B4 — CI hard-gate prevents drift between reviewer-facing
# markdown numerical claims (numbers / ADR slugs / version strings / URLs)
# and canonical sources (`evals/cost_ledger.csv`, `decisions/`,
# `evals/metrics/per_cell.parquet`). Mirrors the lychee CI pattern from
# ADR-064 §C2 + `.github/workflows/link-check.yml`. Runs default-strict;
# matches the local `uv run python scripts/audit_writeup_numbers.py`
# default invocation (per ADR-065 §B2's `--strict` default).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run weekly to catch any drift introduced by upstream-library-driven
  # parquet schema changes (extremely unlikely; defensive only).
  schedule:
    - cron: '0 10 * * MON'

permissions:
  contents: read

jobs:
  audit-writeup-numbers:
    runs-on: ubuntu-latest
    # Don't fail the build for scheduled runs (no merge-blocking signal);
    # DO fail for push/pull_request (catches drift introduced by the diff
    # being merged).
    continue-on-error: ${{ github.event_name == 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install project deps
        run: uv sync --frozen

      - name: Run writeup numerical-claim audit (--strict)
        run: uv run python scripts/audit_writeup_numbers.py

      - name: Run ADR-count-claim audit (chain-effect invariant)
        # Per REPO_AUDIT_2026-05-21 visual-verification finding D1: the
        # v1.2.13 patch added ADR-076 but README's "75 ADRs" claim went
        # stale because the source audit only flagged audit-time-stale
        # counts on other surfaces. This invariant catches the chain
        # effect mechanically: "NN immutable Architecture Decision
        # Records" / "NN ADRs" claims across reader-facing surfaces
        # must match `ls decisions/ADR-*.md | wc -l`. Historical
        # snapshots (with "Phase X close" / "submission gate" / etc.
        # qualifiers in their ±3-line context) are flagged INFO not FAIL.
        run: uv run python scripts/audit_adr_count_claims.py

      - name: Run supersession-backlink + closing_commit audit (v1.2.15)
        # Per v1.2.15 (audit_superseded_by_backlinks.py): every ADR with
        # `supersedes: [N]` must have `superseded_by: [self]` on target.
        # Edges marked axis-only via YAML comment (per ADR-076 / ADR-077
        # narrow-relaxation discipline) are EXEMPT and reported as INFO.
        # Also asserts Accepted ADRs have populated closing_commit
        # (with a small exempt set for governance/backfill ADRs).
        # Catches REPO_AUDIT_2026-05-21 §P1-6 class mechanically.
        run: uv run python scripts/audit_superseded_by_backlinks.py

      - name: Run citation-alignment audit (SOFT at v1.3.7)
        # v1.3.7 — consumer adoption of upstream
        # `eval_toolkit.audit_citation_alignment.validate_citations`
        # (shipped in eval-toolkit v1.0.1; ports
        # brandon-behring/eval-toolkit#73). Catches the v1.3.2 P1-2 bug
        # class: reader-facing markdown citing "per ADR-NNN" where the
        # cited ADR's actual subject category doesn't match the claim
        # category. SOFT gate: continue-on-error: true; script always
        # exits 0; findings are informational in CI logs only.
        # v1.3.8 will promote: remove continue-on-error + script will
        # exit 1 on findings per /exploring-options Q2 lock.
        continue-on-error: true
        run: uv run python scripts/audit_citation_alignment.py
