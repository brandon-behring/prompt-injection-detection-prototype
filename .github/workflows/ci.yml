name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pre-commit:
    name: pre-commit (hard gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: install pre-commit
        run: python -m pip install pre-commit
      - name: pre-commit run --all-files
        run: pre-commit run --all-files

  lint:
    name: lint (hard gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'
      - name: install deps
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format check
        run: uv run ruff format --check .
      - name: mypy strict
        run: uv run mypy --strict .

  test-unit:
    name: test-unit (hard gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'
      - name: install deps
        run: uv sync --extra dev
      - name: pytest -m unit
        run: uv run pytest -m unit -v

  audit:
    name: audit register in sync with ADRs (hard gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'
      - name: install deps
        run: uv sync --extra dev
      - name: regenerate_audit.py --check
        run: uv run python scripts/regenerate_audit.py --check

  site-render:
    name: rendered site audit (hard gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'
      - name: install deps
        run: uv sync --extra dev --extra notebook
      - name: render site
        run: make site
      - name: audit rendered site
        run: make site-audit

  leakage:
    name: leakage_report.leakage_clean=True (hard gate; v1.0.6 + per §1.5 + ADR-039 gate 3 intent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: assert leakage_report.json shows clean
        run: |
          python -c "
          import json
          import sys
          from pathlib import Path
          report_path = Path('evals/leakage_report.json')
          if not report_path.exists():
              sys.exit('FAIL: evals/leakage_report.json does not exist')
          r = json.loads(report_path.read_text())
          if not r.get('leakage_clean', False):
              sys.exit(f'FAIL: leakage_clean is not True; report = {r}')
          print(f'OK: leakage_clean=True; {r.get(\"total_exact_hash_overlaps\", \"?\")} exact-hash overlaps + {r.get(\"total_cosine_overlaps\", \"?\")} cosine >= 0.85 overlaps')
          "

  test-smoke:
    name: test-smoke (soft gate)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'
      - name: install deps
        run: uv sync --extra dev
      - name: pytest -m smoke
        run: uv run pytest -m smoke -v

  test-integration:
    name: test-integration (opt-in)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'
      - name: install deps
        run: uv sync --all-extras
      - name: pytest -m integration
        run: uv run pytest -m integration -v

  notebooks:
    name: notebook execution (opt-in)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'
      - name: install deps
        run: uv sync --extra dev --extra notebook
      - name: pytest --nbval notebooks/
        run: uv run pytest --nbval notebooks/ -v
        continue-on-error: true
