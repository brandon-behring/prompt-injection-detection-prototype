name: Publish Quarto site to GitHub Pages

# Per ADR-030 (deliverable format = Quarto HTML site via GH Actions; supersedes ADR-002)
# Per ADR-033 (release strategy — tag push triggers canonical-submission build)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 'latest'

      - name: install deps
        run: uv sync --extra dev --extra notebook

      - name: Render site
        run: make site

      - name: Audit rendered site
        run: make site-audit

      - name: Publish rendered site to GH Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
