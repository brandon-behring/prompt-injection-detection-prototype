repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          [
            pytest,
            types-PyYAML,
            huggingface_hub>=0.25,
            pandas-stubs>=2.2,
            numpy>=2.0,
            openai>=1.50,
            "transformers>=4.48",
            "peft>=0.13",
            "torch>=2.5",
            "accelerate>=1.0",
          ]
        args: [--strict]
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
  - repo: local
    hooks:
      - id: no-emoji-check
        name: no emoji in source / docs
        entry: python scripts/check_no_emoji.py
        language: system
        types: [text]
        exclude: '^\.pre-commit-config\.yaml$'
      - id: regenerate-audit
        name: SUBMISSION_AUDIT.md in sync with ADRs
        entry: python scripts/regenerate_audit.py --check
        language: system
        pass_filenames: false
        files: '^(decisions/ADR-.*\.md|SUBMISSION_AUDIT\.md|scripts/regenerate_audit\.py)$'
