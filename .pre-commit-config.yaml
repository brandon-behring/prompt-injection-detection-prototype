repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
        # v1.2.8: notebooks/_jupytext/*.py are jupytext-paired exploratory scripts;
        # cells legitimately have non-top-level imports (E402) etc.
        # See pyproject.toml [tool.ruff] extend-exclude for the direct-
        # invocation equivalent.
        exclude: ^notebooks/
      - id: ruff-format
        exclude: ^notebooks/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          [
            pytest,
            types-PyYAML,
            huggingface_hub>=0.25,
            pandas-stubs>=2.2,
            numpy>=2.0,
            openai>=1.50,
            "transformers>=4.48",
            "peft>=0.13",
            "torch>=2.5",
            "accelerate>=1.0",
            "pydantic>=2.5",
            "anthropic>=0.40",
            # v1.3.1 PR-2: scripts/audit_numbers.py reads parquets via pyarrow + computes
            # via scikit-learn. Required for mypy --strict to resolve imports.
            "pyarrow>=17",
            "scikit-learn>=1.5",
          ]
        args: [--strict]
        # v1.2.8: notebooks/ are folder-paired Jupytext exploratory code with
        # untyped pandas/numpy operations; pyproject.toml [tool.mypy]
        # exclude already lists them but pre-commit invokes mypy with
        # explicit file paths so a hook-level exclude is also needed.
        exclude: ^notebooks/
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        # v1.0.7: notebooks/*.ipynb are pre-rendered + frozen-output-cell
        # artifacts per /exploring-options batch 9 Q2 lock. Output cells
        # MUST be preserved on commit (Quarto renders them as static HTML;
        # CI does not re-execute). nbstripout still strips outputs from
        # any other .ipynb (hand-authored notebooks outside v1.0.7).
        exclude: ^notebooks/.*\.ipynb$
  - repo: local
    hooks:
      - id: no-emoji-check
        name: no emoji in source / docs
        entry: python scripts/check_no_emoji.py
        language: system
        types: [text]
        exclude: '^\.pre-commit-config\.yaml$'
      - id: regenerate-audit
        name: SUBMISSION_AUDIT.md in sync with ADRs
        entry: python scripts/regenerate_audit.py --check
        language: system
        pass_filenames: false
        files: '^(decisions/ADR-.*\.md|SUBMISSION_AUDIT\.md|scripts/regenerate_audit\.py)$'
      - id: audit-adr-count-claims
        name: ADR count claims match decisions/ADR-*.md
        entry: python scripts/audit_adr_count_claims.py
        language: system
        pass_filenames: false
        files: '^(decisions/ADR-.*\.md|.*\.(md|qmd))$'
      - id: audit-citation-alignment
        name: ADR-citation alignment (SOFT at v1.3.7; promotes to HARD at v1.3.8)
        # SOFT GATE at v1.3.7: stages=[manual] so the hook doesn't run on
        # normal `git commit` — operators invoke explicitly via
        # `pre-commit run --hook-stage manual audit-citation-alignment`
        # OR via `make audit-citation-alignment`. v1.3.8 will remove
        # `stages: [manual]` to promote to HARD gate (runs on every commit
        # to .md/.qmd surfaces; fails commit on findings).
        entry: python scripts/audit_citation_alignment.py
        language: system
        pass_filenames: false
        stages: [manual]
        files: '^(decisions/ADR-.*\.md|.*\.(md|qmd))$'
      - id: audit-superseded-by-backlinks
        name: ADR supersession back-links + closing_commit invariants
        entry: python scripts/audit_superseded_by_backlinks.py
        language: system
        pass_filenames: false
        files: '^decisions/ADR-.*\.md$'
      - id: audit-numbers
        # v1.3.1 Q8 lock: re-derive every reader-visible number from
        # evals/*.parquet source-of-truth (frozen-probe FPR + BIPIA +
        # InjecAgent slice n + headline AUPRC / AUROC / direct-detection
        # validation + LODO recall + random AUPRC floor). Catches the
        # cross-guide numeric-divergence class of error surfaced by the
        # 2026-05-22 fresh-eyes audit. Triggers on any change to a writeup,
        # an eval parquet, or the audit script itself.
        #
        # language: python (not system) — CI's pre-commit job runs in a
        # bare Python env without project deps; we list pandas/pyarrow/
        # scikit-learn as additional_dependencies so the hook has what
        # it needs to re-derive metrics.
        name: Reader-visible numbers match evals/*.parquet re-derivation
        entry: python scripts/audit_numbers.py --quiet
        language: python
        additional_dependencies:
          - "pandas>=2.2"
          - "pyarrow>=17"
          - "scikit-learn>=1.5"
        pass_filenames: false
        files: '^(README\.md|WRITEUP_PAPER\.md|WRITEUP_NARRATIVE\.md|RESULTS\.md|docs/for-hiring-managers\.md|docs/GLOSSARY\.md|WRITEUP/model-rungs\.md|WRITEUP/limitations-and-future-work\.md|evals/.*\.parquet|scripts/audit_numbers\.py)$'
